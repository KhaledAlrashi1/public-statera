openapi: 3.0.3
info:
  title: Statera API (Partial Static Spec)
  version: 1.0.0
  description: >-
    Partial static OpenAPI contract for the Flask backend. It does not yet cover
    health probes, worker-health endpoints, feature flags, messages,
    notifications, categories, merchants, budgets, memorized transactions, or
    the open-banking route group.
  license:
    name: Proprietary
servers:
  - url: /
tags:
  - name: Auth
  - name: Transactions
  - name: Analytics
  - name: Debt
  - name: Goals
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
  parameters:
    txnId:
      name: txn_id
      in: path
      required: true
      schema:
        type: integer
    accountId:
      name: account_id
      in: path
      required: true
      schema:
        type: integer
    goalId:
      name: goal_id
      in: path
      required: true
      schema:
        type: integer
    taskId:
      name: task_id
      in: path
      required: true
      description: Opaque account-deletion poll token returned by `DELETE /api/account`.
      schema:
        type: string
    q:
      name: q
      in: query
      schema:
        type: string
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
    offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
    month:
      name: month
      in: query
      schema:
        type: string
        pattern: '^\d{4}-(0[1-9]|1[0-2])$'
  responses:
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    OkEnvelope:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/GenericObject'
        meta:
          $ref: '#/components/schemas/GenericObject'
      additionalProperties: true
      required:
        - ok
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
        errors:
          type: array
          items:
            type: string
        code:
          type: string
        error_code:
          type: string
        retry_after:
          type: integer
      additionalProperties: true
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true
        totp_enabled:
          type: boolean
        is_active:
          type: boolean
      additionalProperties: true
    UserProfile:
      type: object
      properties:
        monthly_income_kd:
          type: string
          nullable: true
        payday_day:
          type: integer
          nullable: true
        country:
          type: string
          nullable: true
        email_notifications_enabled:
          type: boolean
        has_debt_choice:
          type: boolean
          nullable: true
        setup_guide_seen:
          type: boolean
        setup_guide_dismissed:
          type: boolean
      additionalProperties: true
    DemoWorkspaceState:
      type: object
      properties:
        active:
          type: boolean
        clearable:
          type: boolean
        loaded_at:
          type: string
          format: date-time
          nullable: true
        month:
          type: string
        months_seeded:
          type: integer
        transactions:
          type: integer
        budgets:
          type: integer
        debt_accounts:
          type: integer
        savings_goals:
          type: integer
        profile_seeded_fields:
          type: array
          items:
            type: string
      additionalProperties: true
    DemoDataClearResult:
      type: object
      properties:
        transactions_cleared:
          type: integer
        budgets_cleared:
          type: integer
        debt_accounts_cleared:
          type: integer
        savings_goals_cleared:
          type: integer
        profile_fields_cleared:
          type: array
          items:
            type: string
      additionalProperties: true
    SecurityEvent:
      type: object
      properties:
        id:
          type: integer
        event_type:
          type: string
        ip_address:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        details:
          $ref: '#/components/schemas/GenericObject'
      additionalProperties: true
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        is_income:
          type: boolean
        user_id:
          type: integer
          nullable: true
      additionalProperties: true
    Merchant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        user_id:
          type: integer
          nullable: true
      additionalProperties: true
    Item:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        amount_kd:
          type: string
        sort_order:
          type: integer
      additionalProperties: true
    Transaction:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
        name:
          type: string
        memo:
          type: string
          nullable: true
        amount_kd:
          type: string
        category:
          type: string
        merchant:
          type: string
          nullable: true
        source:
          type: string
        source_label:
          type: string
        item_count:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
      additionalProperties: true
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string
        display_name:
          type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        remember_me:
          type: boolean
    TotpConfirmRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
    TotpVerifyRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
        type:
          type: string
          enum:
            - totp
            - backup
    Disable2faRequest:
      type: object
      required:
        - password
        - code
      properties:
        password:
          type: string
        code:
          type: string
    ProfileUpdateRequest:
      type: object
      properties:
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true
        monthly_income_kd:
          type: string
          nullable: true
        payday_day:
          type: integer
          nullable: true
        country:
          type: string
          nullable: true
        email_notifications_enabled:
          type: boolean
        has_debt_choice:
          type: boolean
          nullable: true
        setup_guide_seen:
          type: boolean
        setup_guide_dismissed:
          type: boolean
    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
        - confirm_password
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
        confirm_password:
          type: string
    DeleteAccountRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
        confirmation_token:
          type: string
        totp_code:
          type: string
    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    ForgotPasswordConfirmRequest:
      type: object
      required:
        - token
        - new_password
        - confirm_password
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8
        confirm_password:
          type: string
    RequestEmailChangeLinkRequest:
      type: object
      required:
        - new_email
        - current_password
      properties:
        new_email:
          type: string
          format: email
        current_password:
          type: string
    ConfirmEmailChangeRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    RequestPasswordChangeLinkRequest:
      type: object
      required:
        - current_password
      properties:
        current_password:
          type: string
    ConfirmPasswordChangeRequest:
      type: object
      required:
        - token
        - new_password
        - confirm_password
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8
        confirm_password:
          type: string
    TransactionCreateRequest:
      type: object
      required:
        - date
        - category
        - name
        - amount_kd
      properties:
        date:
          type: string
          format: date
        category:
          type: string
        name:
          type: string
        amount_kd:
          type: string
        merchant:
          type: string
        memo:
          type: string
        force:
          type: boolean
        items_json:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/Item'
      additionalProperties: true
    TransactionUpdateRequest:
      type: object
      properties:
        date:
          type: string
          format: date
        category:
          type: string
        name:
          type: string
        amount_kd:
          type: string
        merchant:
          type: string
        memo:
          type: string
        force:
          type: boolean
        items_json:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/Item'
      additionalProperties: true
    DupCheckRequest:
      type: object
      required:
        - date
        - name
        - amount_kd
      properties:
        date:
          type: string
          format: date
        name:
          type: string
        amount_kd:
          type: string
    ImportCommitRequest:
      type: object
      required:
        - rows
      properties:
        rows:
          type: array
          items:
            type: object
            required:
              - date
              - name
              - amount_kd
            properties:
              transaction_id:
                type: integer
              date:
                type: string
                format: date
              category:
                type: string
              name:
                type: string
              amount_kd:
                type: string
              merchant:
                type: string
              memo:
                type: string
              items:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
            additionalProperties: true
        source_messages:
          type: array
          description: >
            Previewed iMessage metadata used to mark reviewed Messages rows as ingested.
            These refs are intentionally consumed even when a user removes the corresponding
            rows from the final import payload, so already-handled transactions do not
            reappear in later iMessage fetches.
          items:
            $ref: '#/components/schemas/GenericObject'
        allow_duplicates:
          type: boolean
        replace_demo_data:
          type: boolean
        atomic:
          type: boolean
          description: Deprecated. Import commits are always atomic and this flag is ignored.
    TemplateFeedbackRequest:
      type: object
      required:
        - feedback_key
        - outcome
      properties:
        feedback_key:
          type: string
        outcome:
          type: string
          enum:
            - accepted
            - rejected
    DebtAccount:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        debt_type:
          type: string
        balance_kd:
          type: string
        minimum_payment_kd:
          type: string
        due_day:
          type: integer
          nullable: true
        apr_pct:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        is_active:
          type: boolean
      additionalProperties: true
    DebtAccountRequest:
      type: object
      properties:
        name:
          type: string
        debt_type:
          type: string
          enum:
            - credit_card
            - personal_loan
            - car_loan
            - other
        balance_kd:
          type: string
        minimum_payment_kd:
          type: string
        due_day:
          type: integer
          nullable: true
        apr_pct:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      additionalProperties: true
    SavingsGoal:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        goal_type:
          type: string
        target_kd:
          type: string
        current_kd:
          type: string
        target_date:
          type: string
          format: date
          nullable: true
        linked_category:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        is_active:
          type: boolean
        projection:
          $ref: '#/components/schemas/GenericObject'
      additionalProperties: true
    SavingsGoalRequest:
      type: object
      properties:
        name:
          type: string
        goal_type:
          type: string
        target_kd:
          type: string
        current_kd:
          type: string
        target_date:
          type: string
          format: date
          nullable: true
        linked_category:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      additionalProperties: true
paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkEnvelope'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password.
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded or requires 2FA.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkEnvelope'
                  - type: object
                    properties:
                      requires_2fa:
                        type: boolean
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Account disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/auth/2fa/setup:
    post:
      tags: [Auth]
      summary: Start 2FA enrollment for the current user.
      operationId: setupTwoFactor
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Enrollment secret and QR code issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkEnvelope'
                  - type: object
                    properties:
                      qr_data_uri:
                        type: string
                      secret_b32:
                        type: string
                      backup_codes:
                        type: array
                        items:
                          type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/transactions/export-xlsx:
    get:
      tags: [Transactions]
      summary: Export the current user transaction dataset as Excel.
      operationId: exportTransactionsXlsx
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Excel export file.
          headers:
            X-Export-Truncated:
              schema:
                type: string
            X-Export-Row-Limit:
              schema:
                type: string
            X-Export-Error-Code:
              schema:
                type: string
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/auth/2fa/confirm:
    post:
      tags: [Auth]
      summary: Confirm 2FA setup with a TOTP code.
      operationId: confirmTwoFactor
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpConfirmRequest'
      responses:
        '200':
          description: 2FA enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Complete a pending 2FA challenge.
      operationId: verifyTwoFactor
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpVerifyRequest'
      responses:
        '200':
          description: 2FA verification succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '410':
          description: Pending 2FA session expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/auth/2fa/disable:
    post:
      tags: [Auth]
      summary: Disable 2FA for the current user.
      operationId: disableTwoFactor
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Disable2faRequest'
      responses:
        '200':
          description: 2FA disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out the current user.
      operationId: logoutUser
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/sessions/revoke-all:
    post:
      tags: [Auth]
      summary: Revoke all active sessions for the current user.
      operationId: revokeAllSessions
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Sessions revoked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkEnvelope'
                  - type: object
                    properties:
                      session_version:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/account:
    delete:
      tags: [Auth]
      summary: Request or confirm account deletion.
      operationId: deleteAccount
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
      responses:
        '200':
          description: Deletion dispatched or completed synchronously.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkEnvelope'
        '202':
          description: Confirmation token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '410':
          description: Confirmation token expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/account/deletion-status/{task_id}:
    get:
      tags: [Auth]
      summary: Poll account deletion task status with an opaque encrypted token.
      operationId: getAccountDeletionStatus
      security: []
      parameters:
        - $ref: '#/components/parameters/taskId'
      responses:
        '200':
          description: Deletion task status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Return the current user and feature flags.
      operationId: getCurrentUser
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Current user payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkEnvelope'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      flags:
                        $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/profile:
    get:
      tags: [Auth]
      summary: Return the authenticated user profile.
      operationId: getProfile
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Profile payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkEnvelope'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      profile:
                        $ref: '#/components/schemas/UserProfile'
                      demo_workspace:
                        $ref: '#/components/schemas/DemoWorkspaceState'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/demo-data:
    post:
      tags: [Auth]
      summary: Load a demo workspace into an empty authenticated account.
      operationId: loadDemoData
      security:
        - sessionCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        '200':
          description: Demo data loaded successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          month:
                            type: string
                          transactions_created:
                            type: integer
                          budgets_created:
                            type: integer
                          debt_accounts_created:
                            type: integer
                          savings_goals_created:
                            type: integer
                          months_seeded:
                            type: integer
                        additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/ValidationError'
  /api/auth/demo-data/clear:
    post:
      tags: [Auth]
      summary: Clear the active demo workspace from the authenticated account.
      operationId: clearDemoData
      security:
        - sessionCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        '200':
          description: Demo workspace cleared successfully.
          content:
            application/json:
