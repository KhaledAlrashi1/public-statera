name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to deploy — leave blank to deploy HEAD. Use to trigger an explicit rollback to a previous commit.'
        required: false

# Serialize deploys: queue the second deploy rather than cancel it.
# cancel-in-progress: false prevents a mid-deploy SSH session from being torn down.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── resolve-sha ─────────────────────────────────────────────────────────────
  # Resolves inputs.sha (may be a short SHA) to a full 40-char commit SHA before
  # any job checks out code or builds an image. All downstream jobs consume this
  # output so the same SHA is used throughout the pipeline.
  resolve-sha:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      full_sha: ${{ steps.resolve-sha.outputs.full_sha }}
    steps:
      - name: Resolve SHA to full form
        id: resolve-sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          INPUT_SHA="${{ inputs.sha }}"
          if [ -n "$INPUT_SHA" ]; then
            # Reject non-SHA inputs (branch names, tags, whitespace) early.
            # Only full or abbreviated hex commit SHAs are valid for rollback —
            # accepting a branch name would silently rewrite the operator's intent
            # into "deploy HEAD of that branch," which is not a rollback.
            if ! [[ "$INPUT_SHA" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              echo "Input SHA '${INPUT_SHA}' is not a valid hex string (7-40 chars)" >&2
              echo "Supply a full or abbreviated commit SHA, not a branch or tag name." >&2
              exit 1
            fi
            FULL_SHA=$(gh api "repos/${{ github.repository }}/commits/${INPUT_SHA}" --jq '.sha')
            if [ -z "$FULL_SHA" ] || [ "${#FULL_SHA}" -ne 40 ]; then
              echo "Could not resolve '${INPUT_SHA}' to a full 40-char SHA" >&2
              exit 1
            fi
            echo "Resolved ${INPUT_SHA} -> ${FULL_SHA}"
          else
            FULL_SHA="${{ github.sha }}"
            echo "Using github.sha: ${FULL_SHA}"
          fi
          echo "full_sha=${FULL_SHA}" >> "$GITHUB_OUTPUT"

  # ── test ────────────────────────────────────────────────────────────────────
  test:
    needs: resolve-sha
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.resolve-sha.outputs.full_sha }}

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa  # v4
        with:
          version: '9.15.9'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Type check — catches type errors before vitest runs
      - run: pnpm --filter api exec tsc --noEmit
      - run: pnpm --filter statera-frontend exec tsc --noEmit

      # Run vitest without watch mode
      - run: pnpm --filter api test run
      - run: pnpm --filter statera-frontend run test:unit

  # ── build-push ──────────────────────────────────────────────────────────────
  build-push:
    needs: [test, resolve-sha]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # required for GHCR push via GITHUB_TOKEN

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.resolve-sha.outputs.full_sha }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      # GITHUB_TOKEN is sufficient for GHCR push; no PAT needed.
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          # Two tags: exact SHA (deployed by deploy.sh) and latest (human reference)
          tags: |
            ghcr.io/khaledalrashi1/statera-api:${{ needs.resolve-sha.outputs.full_sha }}
            ghcr.io/khaledalrashi1/statera-api:latest
          build-args: GIT_SHA=${{ needs.resolve-sha.outputs.full_sha }}
          # OCI revision label: deploy-bootstrap.sh reads this to identify the running SHA for rollback
          labels: |
            org.opencontainers.image.revision=${{ needs.resolve-sha.outputs.full_sha }}
          # BuildKit GHA cache: cache-hit runs skip all layers except source + chown (~20s)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── deploy ──────────────────────────────────────────────────────────────────
  deploy:
    needs: [build-push, resolve-sha]
    runs-on: ubuntu-latest
    # environment: enables GitHub deployment audit log and protection rules
    environment: production

    steps:
      # Set up the CI deploy key. The corresponding public key must be in
      # ~deploy/.ssh/authorized_keys on the server with command= and no-* restrictions.
      # See deploy/DEPLOY.md for the exact authorized_keys format.
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          # printf avoids echo interpreting escape sequences in key material
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/statera_deploy
          chmod 600 ~/.ssh/statera_deploy
          # TOFU for the host key. To harden: store server host key as a secret and
          # use `echo "$SERVER_HOST_KEY" >> ~/.ssh/known_hosts` instead.
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

      # SSH to server with SendEnv so DEPLOY_SHA is available in deploy-bootstrap.sh
      # via AcceptEnv. The server's authorized_keys has command= pointing at
      # deploy-bootstrap.sh, so the connection always runs the bootstrap regardless
      # of any script we send — the env var is what carries the target SHA.
      - name: Deploy
        run: |
          ssh \
            -i ~/.ssh/statera_deploy \
            -o SendEnv=DEPLOY_SHA \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            "$DEPLOY_USER@$DEPLOY_HOST"
        env:
          # DEPLOY_SHA name is contractual: SendEnv → AcceptEnv → deploy-bootstrap.sh reads $DEPLOY_SHA.
          DEPLOY_SHA: ${{ needs.resolve-sha.outputs.full_sha }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
