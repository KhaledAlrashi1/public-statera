services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment: &backend_env
      FLASK_APP: run.py
      FLASK_ENV: production
      PERSONAL_STATERA_DEV_MODE: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENABLE_OPEN_BANKING: "false"
      PROXY_FIX_NUM_PROXIES: "1"
      HTTPS_ONLY: "true"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RATE_LIMIT_BACKEND: redis
      GUNICORN_WORKERS: "2"
      GUNICORN_THREADS: "4"
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      OPERATOR_API_TOKEN: ${OPERATOR_API_TOKEN}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      ANALYTICS_COMPUTE_TIMEOUT_SECONDS: ${ANALYTICS_COMPUTE_TIMEOUT_SECONDS:-10}
      ANALYTICS_CACHE_CIRCUIT_BREAKER_ENABLED: ${ANALYTICS_CACHE_CIRCUIT_BREAKER_ENABLED:-true}
      ANALYTICS_CACHE_CIRCUIT_BREAKER_TIMEOUT_SECONDS: ${ANALYTICS_CACHE_CIRCUIT_BREAKER_TIMEOUT_SECONDS:-10}
      POSTMARK_API_KEY: ${POSTMARK_API_KEY}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_USE_TLS: ${MAIL_USE_TLS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz').read()\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    entrypoint: ["./docker/worker-entrypoint.sh"]
    environment:
      <<: *backend_env
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY}
    volumes:
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    entrypoint: ["./docker/beat-entrypoint.sh"]
    environment:
      <<: *backend_env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      replicas: 1

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  pgdata:
