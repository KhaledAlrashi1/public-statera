services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-statera}
      MYSQL_USER: ${MYSQL_USER:-statera}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-statera}
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u $$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      API_PORT: "3000"
      DATABASE_URL: mysql://${MYSQL_USER:-statera}:${MYSQL_PASSWORD:-statera}@mysql:3306/${MYSQL_DATABASE:-statera}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ENCRYPTION_KEY_PREVIOUS: ${ENCRYPTION_KEY_PREVIOUS:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      REDIS_URL: "redis://redis:6379/1"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:3002}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
      OAUTH_ISSUER_URL: ${OAUTH_ISSUER_URL:-https://accounts.google.com}
      OAUTH_PROVIDER: ${OAUTH_PROVIDER:-google}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      POSTMARK_API_KEY: ${POSTMARK_API_KEY:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@example.com}
      ENABLE_OPEN_BANKING: ${ENABLE_OPEN_BANKING:-false}
      ENABLE_TEMPLATE_SUGGESTIONS: ${ENABLE_TEMPLATE_SUGGESTIONS:-false}
      ENABLE_RECURRING_PATTERNS: ${ENABLE_RECURRING_PATTERNS:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const h=require('http');h.get('http://127.0.0.1:3000/healthz',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    command: ["pnpm", "--filter", "statera-api", "worker"]
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://${MYSQL_USER:-statera}:${MYSQL_PASSWORD:-statera}@mysql:3306/${MYSQL_DATABASE:-statera}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ENCRYPTION_KEY_PREVIOUS: ${ENCRYPTION_KEY_PREVIOUS:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      REDIS_URL: "redis://redis:6379/1"
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      POSTMARK_API_KEY: ${POSTMARK_API_KEY:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@example.com}
      ENABLE_OPEN_BANKING: ${ENABLE_OPEN_BANKING:-false}
      ENABLE_TEMPLATE_SUGGESTIONS: ${ENABLE_TEMPLATE_SUGGESTIONS:-false}
      ENABLE_RECURRING_PATTERNS: ${ENABLE_RECURRING_PATTERNS:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysqldata:
